name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: Crossgaze
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d Crossgaze" --health-interval=5s
          --health-timeout=5s --health-retries=10

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/Crossgaze
      NEXT_TELEMETRY_DISABLED: "1"
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_USER: ci@example.com
      SMTP_PASS: ci-pass
      SMTP_FROM: "CI <ci@example.com>"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
